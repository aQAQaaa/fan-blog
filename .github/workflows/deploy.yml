name: Deploy to GitHub Pages

on:
  push:
    branches: [main]  # 仅在推送到 main 分支时触发部署

# 并发控制：避免同一分支多次部署冲突，新提交自动取消旧任务
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，方便框架生成页面路由

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 匹配你项目的 Node.js 版本
          cache: 'npm'         # 缓存 node_modules，加速构建

      - name: Install dependencies
        run: npm install  # 若使用 yarn/pnpm，替换为对应命令

      - name: Build project
        run: npm run build  # 执行项目的构建命令，生成静态文件

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public  # 构建产物目录，若为 dist/out 请修改
          publish_branch: gh-pages  # 部署到 gh-pages 分支
          force_orphan: true  # 保持 gh-pages 分支为干净的静态文件
